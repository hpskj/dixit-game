<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>لوحة التحكم</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="hero smallHero"><div><h1>🛠️ لوحة التحكم</h1><p>إدارة الكروت والمؤقتات — خاصة بالأدمن فقط.</p></div><div class="rowActions"><button id="logoutBtn" class="danger">تسجيل الخروج</button><a class="adminLink" href="index.html">العودة للعبة</a></div></header>
<main>
<section class="panel adminGrid">
  <div class="adminCard"><h2>⏱️ المؤقتات</h2><label>وقت اختيار الكروت / الراوي بالثواني</label><input id="selectTimer" type="number" min="5" max="300" value="30"><label>وقت التصويت بالثواني</label><input id="voteTimer" type="number" min="5" max="300" value="20"><button id="saveSettings">حفظ المؤقتات</button><p class="muted">تطبق المؤقتات الجديدة عند بدء لعبة جديدة.</p></div>
  <div class="adminCard"><h2>➕ إضافة كرت واحد</h2><input id="singleTitle" placeholder="اسم الكرت"><input id="singleImage" type="file" accept="image/*"><button id="addSingle">إضافة</button></div>
  <div class="adminCard"><h2>📦 إضافة مجموعة صور</h2><input id="bulkImages" type="file" accept="image/*" multiple><button id="addBulk">رفع المجموعة</button><p class="muted">اسم كل ملف يصبح اسم الكرت.</p></div>
</section>
<section class="panel"><h2>كل الكروت</h2><div id="cardsList" class="adminGrid"></div></section>
</main>
<div id="toast"></div><script src="admin.js"></script></body></html>
