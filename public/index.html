<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🎨 لعبة خيال أونلاين</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="hero">
  <div>
    <h1>🎨 لعبة خيال أونلاين</h1>
    <p id="welcomeText">سجّل دخولك ثم اختر غرفة اللعب المناسبة.</p>
  </div>
  <div class="topActions">
    <div id="timerText" class="timerText"></div>
    <a href="/" class="adminLink">اللعبة</a>
    <a href="/profile.html" class="adminLink">بروفايلي</a>
    <a href="/leaderboard.html" class="adminLink">الترتيب</a>
    <button id="logoutPlayerBtn" class="danger smallBtn" type="button">خروج</button>
  </div>
</header>

<main>
  <section id="roomsBox" class="panel joinPanel">
    <h2>غرف اللعب</h2>
    <p class="muted smallHint">كل غرفة تحتوي فئة صور مختلفة يحددها الأدمن.</p>
    <div id="resumeBox" class="resumeBox hidden"></div>
    <div id="roomsList" class="roomsGrid"></div>
    <hr class="sep">
    <h3>أو ادخل بكود دعوة</h3>
    <div class="joinControls codeOnly">
      <input id="codeInput" placeholder="كود الغرفة">
      <button id="joinBtn" type="button">دخول بالكود</button>
    </div>
  </section>

  <section id="gameBox" class="layout hidden">
    <aside class="panel side">
      <h2>👥 اللاعبين</h2>
      <div id="players"></div>
    </aside>

    <section class="panel playArea">
      <h2 id="roomTitle"></h2>
      <h3 id="hintTitle"></h3>
      <div id="actions"></div>
      <div id="playTimerBox" class="playTimerBox hidden" aria-live="polite">
        <span class="playTimerLabel">⏱️ الوقت المتبقي</span>
        <strong id="playTimerText">--</strong>
      </div>
      <h3>🃏 يدك</h3>
      <div id="hand" class="cardsGrid"></div>
      <h3>🎴 الطاولة</h3>
      <div id="table" class="cardsGrid tableGrid"></div>
    </section>
  </section>
</main>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
<script src="/smart-features.js"></script>
</body>
</html>
