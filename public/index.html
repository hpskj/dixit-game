<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🎨 لعبة خيال أونلاين</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="hero">
  <div>
    <h1>🎨 لعبة خيال أونلاين</h1>
    <p>كروت، تلميحات، تصويت، نقاط، ومتعة!</p>
  </div>
  <div id="timerText" class="timerText"></div>
</header>

<main>
  <section id="joinBox" class="panel joinPanel">
    <h2>ابدأ اللعب</h2>
    <input id="nameInput" placeholder="اسمك">
    <div class="joinControls">
      <button id="joinBtn" type="button">دخول</button>
      <input id="codeInput" placeholder="كود الغرفة">
      <button id="createBtn" type="button">إنشاء غرفة</button>
    </div>
    <p class="muted smallHint">للدعوة: أنشئ غرفة أولاً، ثم انسخ الرابط من داخل الغرفة.</p>
  </section>

  <section id="gameBox" class="layout hidden">
    <aside class="panel side">
      <h2>👥 اللاعبين</h2>
      <div id="players"></div>
    </aside>

    <section class="panel playArea">
      <h2 id="hintTitle"></h2>
      <div id="actions"></div>
      <h3>🃏 يدك</h3>
      <div id="hand" class="cardsGrid"></div>
      <h3>🎴 الطاولة</h3>
      <div id="table" class="cardsGrid tableGrid"></div>
    </section>
  </section>
</main>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
<script src="/auth-widget.js"></script>
<script src="/smart-features.js"></script>
</body>
</html>
